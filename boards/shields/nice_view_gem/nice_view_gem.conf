CONFIG_ZMK_DISPLAY=y
# Blank the screen on IDLE (not deep sleep). With deep sleep off (see corne.conf,
# ZMK #3207) this is the main idle-time power saver; a keypress reliably brings the
# screen back because idle-wake is a separate path from the broken deep-sleep wake.
# If the screen ever fails to come back from idle too, set this to n (screen always
# on — nice!view is reflective so the panel itself costs almost nothing).
CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=y
CONFIG_ZMK_DISPLAY_DEDICATED_THREAD_STACK_SIZE=4096