# Uncomment the following lines to enable the Corne RGB Underglow
# CONFIG_ZMK_RGB_UNDERGLOW=y
# CONFIG_WS2812_STRIP=y

# Uncomment the following line to enable the Corne OLED Display
CONFIG_ZMK_DISPLAY=y

# Enable mouse / pointing for the mouse layer
CONFIG_ZMK_POINTING=y

# BLE 라디오 TX 파워 0dBm -> +8dBm (nRF52840 최대). 반쪽 간(왼central<->오른peripheral)
# 링크를 강하게 만들어 패킷 유실/재전송을 줄임. 빠른 좌우 번갈아치기에서 오른쪽 키가
# 늦게 도착해 순서가 뒤집히던(예: "문제"->"ㅁ누") transposition 완화가 목적.
# 호스트 링크에도 같이 적용. 소비전력 영향은 미미.
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# --- Battery: deep sleep DISABLED to dodge ZMK main regression #3207 ---
# Normally deep sleep is the biggest battery saver (powers down radio + MCU after
# inactivity, keypress wakes it). BUT on current ZMK main (Zephyr 4.1) the split
# CENTRAL (left) half fails to wake from deep sleep and drains instead: the screen
# stays dark after a keypress and the left battery burns ~3x faster than the right.
# That is upstream bug zmkfirmware/zmk#3207 (still OPEN, no fix; absent in v0.3.0 /
# Zephyr 3.5). We can't downgrade to v0.3.0 because the nice_view_gem widgets use
# LVGL 9 (Zephyr 4.1) APIs. So keep deep sleep OFF until #3207 is fixed — the board
# then only goes "idle" (low-power, radio alive), whose wake path is unaffected.
# Re-enable (=y) once #3207 is resolved to reclaim the best battery life.
CONFIG_ZMK_SLEEP=n
# CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=600000   # 10 min (ms) — only applies when SLEEP=y

# --- Battery: stop the gem animation (static gem = lowest draw) ---
# The crystal animation redraws continuously while the board is awake. A static
# gem removes that cost. To keep a slow-moving gem instead, comment the line
# below and uncomment the *_MS line (higher = slower = less power).
CONFIG_NICE_VIEW_GEM_ANIMATION=n
# CONFIG_NICE_VIEW_GEM_ANIMATION_MS=5000
